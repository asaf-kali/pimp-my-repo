name: Checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  check-ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-all
    - run: just check-ruff

  check-mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-all
    - run: just check-mypy

  test-unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-test
    - run: just cover-xml
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: asaf-kali/pimp-my-repo
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results

  test-e2e:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bottle
            args: https://github.com/bottlepy/bottle.git 2a743a30
          - name: requests
            args: https://github.com/psf/requests.git bc04dfd6
          - name: simplejson
            args: https://github.com/simplejson/simplejson.git f7122a4f
          - name: docopt
            args: https://github.com/docopt/docopt.git 8fea867d
          - name: pyfiglet
            args: https://github.com/pwaller/pyfiglet.git e7590f2b
          - name: itsdangerous
            args: https://github.com/pallets/itsdangerous.git 672971d6
          - name: httpie
            args: https://github.com/httpie/httpie.git 5b604c37
          - name: django
            args: https://github.com/django/django.git edd89978
          - name: scikit-learn
            args: https://github.com/scikit-learn/scikit-learn.git cc4843ad
          - name: cavity-design
            args: https://github.com/mkali-weizmann/cavity-design.git ea21f1c7
          # ty cases
          - name: django-ty
            args: https://github.com/django/django.git edd89978 --ty
          - name: scikit-learn-ty
            args: https://github.com/scikit-learn/scikit-learn.git cc4843ad --ty
          - name: pandas
            args: https://github.com/pandas-dev/pandas.git 92796356 --ty
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-test
    - name: Run E2E test - ${{ matrix.name }}
      run: just test-e2e ${{ matrix.args }}
    - name: Upload PMR logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pmr-logs-${{ strategy.job-index }}
        path: ~/.local/state/pmr/*.log
        if-no-files-found: ignore
