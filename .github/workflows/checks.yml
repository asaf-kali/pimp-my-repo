name: Checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  check-ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-all
    - run: just check-ruff

  check-mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-all
    - run: just check-mypy

  test-unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-test
    - run: just cover-xml
    - name: Extract coverage percentage
      run: |
        COVERAGE=$(just cover-percentage)
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "Coverage: $COVERAGE%"

  test-e2e:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: https://github.com/django/django.git
          - repo: https://github.com/bottlepy/bottle.git
          - repo: https://github.com/psf/requests.git
          - repo: https://github.com/simplejson/simplejson.git
          - repo: https://github.com/docopt/docopt.git
          - repo: https://github.com/pwaller/pyfiglet.git
          - repo: https://github.com/pallets/itsdangerous.git
          - repo: https://github.com/mkali-weizmann/cavity-design.git
            rev: ea21f1c759e473dd5e9c843230d2429501637026
          # Takes too long:
          # - repo: https://github.com/pandas-dev/pandas.git
          # - repo: https://github.com/scikit-learn/scikit-learn.git
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - run: just install-run
    - name: Run E2E test - ${{ matrix.repo }}
      run: |
        REV="${{ matrix.rev }}"
        if [ -n "$REV" ]; then
          just test-e2e ${{ matrix.repo }} --rev "$REV"
        else
          just test-e2e ${{ matrix.repo }}
        fi
