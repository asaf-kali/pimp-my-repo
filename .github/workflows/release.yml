name: Release

on:
  workflow_run:
    workflows: ["Unit Tests", "E2E Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      all_passed: ${{ steps.verify.outputs.all_passed }}
    steps:
    - name: Verify all required workflows passed
      id: verify
      uses: actions/github-script@v7
      with:
        script: |
          const sha = context.payload.workflow_run.head_sha;
          const required = ["Unit Tests", "E2E Tests"];
          const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRunsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            head_sha: sha,
            per_page: 100,
          });
          const latestByName = {};
          for (const run of runs) {
            const prev = latestByName[run.name];
            if (!prev || new Date(run.updated_at) > new Date(prev.updated_at)) {
              latestByName[run.name] = run;
            }
          }
          const allPassed = required.every(name => latestByName[name]?.conclusion === "success");
          core.setOutput("all_passed", allPassed ? "true" : "false");
          core.info(`SHA: ${sha}`);
          for (const name of required) {
            core.info(`${name}: ${latestByName[name]?.conclusion ?? "not found"}`);
          }

  release:
    needs: check
    if: needs.check.outputs.all_passed == 'true' && !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install UV
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install dependencies
      run: just install-all

    - name: Run semantic release
      id: semrel
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        just semrel
        ls dist/*.whl 2>/dev/null && echo "released=true" >> $GITHUB_OUTPUT || echo "released=false" >> $GITHUB_OUTPUT

    - name: Upload to PyPI
      if: steps.semrel.outputs.released == 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
