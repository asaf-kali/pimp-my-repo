name: Release

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - uses: ./.github/actions/setup
    - run: just install-all
    - name: Run semantic release
      id: semrel
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        just semrel
        ls dist/*.whl 2>/dev/null && echo "released=true" >> $GITHUB_OUTPUT || echo "released=false" >> $GITHUB_OUTPUT
    - name: Upload to PyPI
      if: steps.semrel.outputs.released == 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
