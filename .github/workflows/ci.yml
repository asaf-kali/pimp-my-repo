name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    uses: ./.github/workflows/checks.yml

  delivery:
    needs: [checks]
    if: "github.ref == 'refs/heads/main'"
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/delivery.yml
